<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}">

  <title>{% block title %}ShoeStore{% endblock %}</title>
</head>

<body>

<header class="site-header">
  <div class="container header-inner">

    <a class="brand" href="{{ url_for('index') }}">
      <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Shoe store logo" />
      <h1 class="brand-title">ShoeStore</h1>
    </a>

    <nav class="nav">
      <a href="{{ url_for('index') }}">Home</a>
      <a href="{{ url_for('products_list') }}">Products</a>
      <a href="/add-product">Add Product</a>
      <a href="/add-category">Add Category</a>
    </nav>

  </div>
</header>

<main class="main">
  <div class="container">

    {% block content %}
    {% endblock %}

  </div>
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <small>© 2026 ShoeStore Group420</small>
    <a href="mailto:support@group420.com">support@group420.com</a>
  </div>
</footer>

</body>
</html>
